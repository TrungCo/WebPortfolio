<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-pink-700">Content Manager Dashboard</h1>
            <a href="/" target="_blank" class="text-sm font-semibold px-4 py-2 border rounded hover:bg-gray-100">View Live Site &rarr;</a>
        </div>
        
        <form id="adminForm" class="space-y-8">
            <!-- Hero Section -->
            <fieldset class="border p-6 rounded-lg bg-gray-50">
                <legend class="text-xl font-bold text-gray-700 px-2">Hero Section</legend>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Your Name</label>
                        <input type="text" id="heroName" class="w-full rounded border-gray-300 p-2 font-bold text-lg" placeholder="Nguyễn Thành Trung" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Headline/Title (supports HTML)</label>
                        <input type="text" id="heroTitle" class="w-full rounded border-gray-300 p-2" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Subtitle</label>
                        <textarea id="heroSubtitle" class="w-full rounded border-gray-300 p-2" rows="3"></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- About Section -->
            <fieldset class="border p-6 rounded-lg bg-gray-50">
                <legend class="text-xl font-bold text-gray-700 px-2">About Section</legend>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Title (supports HTML)</label>
                        <input type="text" id="aboutTitle" class="w-full rounded border-gray-300 p-2" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Paragraph 1</label>
                        <textarea id="aboutP1" class="w-full rounded border-gray-300 p-2" rows="3"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Paragraph 2</label>
                        <textarea id="aboutP2" class="w-full rounded border-gray-300 p-2" rows="3"></textarea>
                    </div>
                </div>
            </fieldset>
            
            <!-- Contact Section -->
            <fieldset class="border p-6 rounded-lg bg-gray-50">
                <legend class="text-xl font-bold text-gray-700 px-2">Contact Info</legend>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Email</label>
                        <input type="text" id="contactEmail" class="w-full rounded border-gray-300 p-2" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Github URL/Handle</label>
                        <input type="text" id="contactGithub" class="w-full rounded border-gray-300 p-2" />
                    </div>
                </div>
            </fieldset>

            <!-- Categories GUI -->
            <fieldset class="border p-6 rounded-lg bg-gray-50">
                <legend class="text-xl font-bold text-gray-700 px-2 flex justify-between w-full items-center">
                    <span>Category Management</span>
                </legend>
                <p class="text-sm text-gray-500 mb-6 border-b pb-4">Manage project filter tabs.</p>
                <div id="categoriesContainer" class="space-y-4"></div>
                <button type="button" id="addCategoryBtn" class="mt-4 w-full border-2 border-dashed border-gray-300 text-gray-600 font-bold py-2 rounded-lg hover:bg-gray-100 transition-colors shadow-sm flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Category
                </button>
            </fieldset>

            <!-- Projects GUI -->
            <fieldset class="border p-6 rounded-lg bg-gray-50">
                <legend class="text-xl font-bold text-gray-700 px-2 flex justify-between w-full items-center">
                    <span>Projects Portfolio</span>
                </legend>
                <p class="text-sm text-gray-500 mb-6 border-b pb-4">Manage your projects visually below. You can change titles, images, categories, and direct links without touching code.</p>
                
                <div id="projectsContainer" class="space-y-6">
                    <!-- Javascript will render project cards here -->
                </div>

                <button type="button" id="addProjectBtn" class="mt-6 w-full border-2 border-dashed border-pink-300 text-pink-700 font-bold py-3 rounded-lg hover:bg-pink-50 transition-colors shadow-sm flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Project
                </button>
            </fieldset>

            <button type="submit" class="w-full bg-pink-700 text-white font-bold py-4 rounded-lg hover:bg-pink-800 transition-colors text-lg shadow-md">
                Save All Changes
            </button>
        </form>
    </div>

    <script>
        // Global state
        let globalCategories = [];
        let globalProjects = [];

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            
            globalCategories.forEach((cat, index) => {
                const html = `
                    <div class="flex gap-4 items-center border p-3 bg-white rounded shadow-sm">
                        <div class="flex-1">
                            <label class="block text-xs font-semibold mb-1 text-gray-600">Category Tag (e.g. 'react')</label>
                            <input type="text" class="w-full rounded border-gray-300 p-2 text-sm" value="${cat.id}" oninput="updateCat(${index}, 'id', this.value)" />
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-semibold mb-1 text-gray-600">Display Name</label>
                            <input type="text" class="w-full rounded border-gray-300 p-2 text-sm" value="${cat.name}" oninput="updateCat(${index}, 'name', this.value)" />
                        </div>
                        <button type="button" class="text-red-500 font-bold px-3 py-2 mt-4 hover:bg-red-50 rounded" onclick="removeCat(${index})">X</button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            
            // Re-render projects to keep dropdown updated
            renderProjects();
        }

        window.updateCat = function(index, key, val) { globalCategories[index][key] = val; renderProjects(); };
        window.removeCat = function(index) { if(confirm('Delete this category?')) { globalCategories.splice(index, 1); renderCategories(); } };
        document.getElementById('addCategoryBtn').addEventListener('click', () => {
            globalCategories.push({id: 'new-tag', name: 'New Category'});
            renderCategories();
        });

        function renderProjects() {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '';
            
            if(globalProjects.length === 0) {
                container.innerHTML = '<p class="text-gray-400 italic text-center py-4">No projects yet. Click the button below to add one.</p>';
            }

            globalProjects.forEach((proj, index) => {
                const isReact = proj.tag === 'react';
                const html = `
                    <div class="border border-gray-200 p-5 rounded-lg bg-white shadow-sm relative transition-all hover:shadow-md">
                        <button type="button" class="absolute top-4 right-4 text-red-500 hover:text-red-700 font-bold bg-red-50 hover:bg-red-100 px-3 py-1 rounded-md text-sm transition-colors" onclick="removeProject(${index})">
                            Delete
                        </button>
                        <h4 class="font-bold text-lg mb-4 text-gray-800 border-b pb-2">Project #${index + 1}</h4>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-600">Title</label>
                                <input type="text" class="w-full rounded border-gray-300 p-2" value="${(proj.title || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'title', this.value)" />
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-600">Version Badge (e.g. v1.0.0)</label>
                                <input type="text" class="w-full rounded border-gray-300 p-2" value="${(proj.version || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'version', this.value)" />
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-semibold mb-1 text-gray-600">Short Description</label>
                            <input type="text" class="w-full rounded border-gray-300 p-2" value="${(proj.description || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'description', this.value)" />
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-600">Tech Details / Sub-description</label>
                                <input type="text" class="w-full rounded border-gray-300 p-2 placeholder-gray-400" placeholder="e.g. Built with Vue & Node.js" value="${(proj.techDetails || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'techDetails', this.value)" />
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-600">Category Tag (Filter)</label>
                                <select class="w-full rounded border-gray-300 p-2 bg-gray-50" onchange="updateProject(${index}, 'tag', this.value)">
                                    ${globalCategories.map(cat => `<option value="${cat.id}" ${proj.tag === cat.id ? 'selected' : ''}>${cat.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-600">Image URL</label>
                                <input type="text" class="w-full rounded border-gray-300 p-2 text-sm" placeholder="https://..." value="${(proj.image || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'image', this.value)" />
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-600">Github Link (On Click)</label>
                                <input type="text" class="w-full rounded border-gray-300 p-2 text-sm text-blue-600" placeholder="https://github.com/..." value="${(proj.githubLink || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'githubLink', this.value)" />
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1 text-gray-600">Terminal Command snippet (Overlay)</label>
                            <input type="text" class="w-full rounded border-gray-300 p-2 font-mono text-sm bg-gray-900 text-green-400" value="${(proj.command || '').replace(/"/g, '&quot;')}" oninput="updateProject(${index}, 'command', this.value)" />
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Project mutators
        window.updateProject = function(index, key, value) {
            globalProjects[index][key] = value;
        };

        window.removeProject = function(index) {
            if(confirm('Are you sure you want to delete this project?')) {
                globalProjects.splice(index, 1);
                renderProjects();
            }
        };

        document.getElementById('addProjectBtn').addEventListener('click', () => {
            globalProjects.push({
                id: 'project-' + Date.now(),
                title: 'New Project',
                version: 'v1.0',
                description: 'A brand new project idea.',
                techDetails: 'Built with React',
                command: 'npm run start',
                tag: 'react',
                image: 'https://via.placeholder.com/600x400/1E293B/ffffff?text=Project+Cover',
                githubLink: 'https://github.com'
            });
            renderProjects();
        });

        // Load data on start
        fetch('/api/content')
            .then(res => res.json())
            .then(data => {
                document.getElementById('heroName').value = data.hero.name || '';
                document.getElementById('heroTitle').value = data.hero.title || '';
                document.getElementById('heroSubtitle').value = data.hero.subtitle;
                
                document.getElementById('aboutTitle').value = data.about.title;
                document.getElementById('aboutP1').value = data.about.paragraph1;
                document.getElementById('aboutP2').value = data.about.paragraph2;
                
                document.getElementById('contactEmail').value = data.contact.email;
                document.getElementById('contactGithub').value = data.contact.github;
                
                if (data.categories && Array.isArray(data.categories)) {
                    globalCategories = data.categories;
                }
                renderCategories();

                if (data.projects && Array.isArray(data.projects)) {
                    globalProjects = data.projects;
                }
                renderProjects();
            });

        // Save data on submit
        document.getElementById('adminForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const ogText = btn.innerHTML;
            btn.innerText = "Saving...";
            
            const payload = {
                hero: {
                    name: document.getElementById('heroName').value,
                    title: document.getElementById('heroTitle').value,
                    subtitle: document.getElementById('heroSubtitle').value
                },
                about: {
                    title: document.getElementById('aboutTitle').value,
                    paragraph1: document.getElementById('aboutP1').value,
                    paragraph2: document.getElementById('aboutP2').value
                },
                contact: {
                    email: document.getElementById('contactEmail').value,
                    github: document.getElementById('contactGithub').value
                },
                categories: globalCategories,
                projects: globalProjects
            };

            fetch('/api/content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    btn.innerText = "Website updated successfully!";
                    btn.classList.replace('bg-pink-700', 'bg-green-600');
                    btn.classList.replace('hover:bg-pink-800', 'hover:bg-green-700');
                    setTimeout(() => {
                        btn.innerHTML = ogText;
                        btn.classList.replace('bg-green-600', 'bg-pink-700');
                        btn.classList.replace('hover:bg-green-700', 'hover:bg-pink-800');
                    }, 3000);
                }
            }).catch(err => {
                alert("API Error: Server must be running via 'npm start' to save.");
                btn.innerHTML = ogText;
            });
        });
    </script>
</body>
</html>
